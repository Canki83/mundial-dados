<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial de Dados</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="app">
    <section class="card">
      <div class="titulo">
        <span class="pelota">⚽</span>
        <h1>Mundial de Dados</h1>
        <span class="dado">🎲</span>
      </div>

      <p class="subtitulo">
        Elegí jugadores, selecciones y simulá partidos con dados.
      </p>

      <section id="pantalla-inicio">
        <div class="formulario">
          <label for="cantidadJugadores">Cantidad de jugadores</label>
          <select id="cantidadJugadores" onchange="generarFormularioJugadores()">
            <option value="1">1 jugador</option>
            <option value="2">2 jugadores</option>
            <option value="3">3 jugadores</option>
            <option value="4">4 jugadores</option>
          </select>
        </div>

        <div id="jugadoresContainer"></div>

        <button onclick="iniciarJuego()">Comenzar Mundial</button>
      </section>

      <section id="pantalla-juego" class="hidden">
        <h2 class="seccion-titulo">Jugadores</h2>
        <div id="resumenJugadores" class="resumen-jugadores"></div>

        <div class="info-partido">
          <p id="numeroPartido">Partido 1 de 6</p>
          <h2 id="nombreGrupo">Grupo A</h2>
        </div>

        <div class="partido">
          <div class="equipo">
            <div id="banderaA" class="bandera">🇦🇷</div>
            <h2 id="equipoA">Equipo A</h2>
          </div>

          <div class="versus">VS</div>

          <div class="equipo">
            <div id="banderaB" class="bandera">🇧🇷</div>
            <h2 id="equipoB">Equipo B</h2>
          </div>
        </div>

        <button id="botonTirar" onclick="tirarDado()">Tirar dado</button>

        <div class="resultado">
          <p id="dado">🎲</p>
          <h2 id="resultado">Esperando tirada...</h2>
        </div>

        <button id="botonSiguiente" class="boton-secundario hidden" onclick="siguientePartido()">
          Siguiente partido
        </button>

        <h2 class="seccion-titulo">Tabla de posiciones</h2>

        <div class="tabla-contenedor">
          <table>
            <thead>
              <tr>
                <th>Equipo</th>
                <th>PJ</th>
                <th>G</th>
                <th>E</th>
                <th>P</th>
                <th>Pts</th>
              </tr>
            </thead>
            <tbody id="tablaPosiciones"></tbody>
          </table>
        </div>

        <div class="reglas">
          <p><strong>1-2:</strong> gana Equipo A</p>
          <p><strong>3-4:</strong> empate</p>
          <p><strong>5-6:</strong> gana Equipo B</p>
        </div>

        <button class="boton-secundario" onclick="volverInicio()">Volver al inicio</button>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
